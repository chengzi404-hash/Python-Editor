name: build-tag-version

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: test (${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Tk (Ubuntu only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Install pytest
        run: python -m pip install pytest

      - name: Run tests
        run: python -m pytest -v --tb=short

  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Tk (Ubuntu only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync dependencies
        run: uv sync

      - name: Build with PyInstaller
        run: pyinstaller PythonEditor.spec --noconfirm --clean

      - name: Create release directory
        run: |
          mkdir -p release
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "dist/PythonEditor.exe" release/
          else
            cp dist/PythonEditor release/
          fi
          if [ -d "data/i18n/locales" ]; then
            mkdir -p release/modules/i18n/locales
            cp data/i18n/locales/*.json release/modules/i18n/locales/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PythonEditor-${{ matrix.os }}-${{ github.ref_name }}
          path: release/

  approval:
    name: manual approval
    runs-on: ubuntu-latest
    needs: build
    environment: release

    steps:
      - name: Wait for build
        run: echo "Build completed. Waiting for manual approval to create release."

  release:
    name: create release
    runs-on: ubuntu-latest
    needs: [approval]

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: artifacts/**/*
