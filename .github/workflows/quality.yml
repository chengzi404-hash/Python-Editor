name: code-quality

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    # 每周一 06:00 UTC 扫描, 捕获依赖升级 / 配置漂移
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  ruff:
    name: ruff lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: python -m pip install --upgrade pip && python -m pip install ruff

      - name: Run ruff check
        run: ruff check --output-format=github .

      - name: Run ruff format check
        run: ruff format --check .

  black:
    name: black format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install black
        run: python -m pip install --upgrade pip && python -m pip install "black>=24.0"

      - name: Run black --check
        run: black --check --diff .
