name: 功能请求
description: 为项目提出建议
labels: enhancement
body:
  - type: markdown
    attributes:
      value: |
        感谢您提出功能建议！请填写以下详细信息。
  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 清晰描述该功能。
      placeholder: 描述该功能...
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 解决的问题
      description: 此功能解决什么问题？
      placeholder: 问题是...
  - type: textarea
    id: alternatives
    attributes:
      label: 考虑的替代方案
      description: 你考虑过的替代方案。
      placeholder: 替代方案...
  - type: textarea
    id: additional
    attributes:
      label: 其他信息
      description: 关于此功能请求的任何其他信息。
      placeholder: 其他信息...
