<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Page not found</title>
<style>
body { font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
       display: flex; align-items: center; justify-content: center;
       min-height: 100vh; margin: 0; background: #fafbfd; color: #1f2328; }
.container { text-align: center; max-width: 480px; padding: 24px; }
h1 { font-size: 96px; font-weight: 200; margin: 0; color: #cf222e; }
h2 { font-weight: 400; color: #57606a; margin: 0 0 24px; }
a { color: #0969da; text-decoration: none; }
a:hover { text-decoration: underline; }
.path { font-family: 'SF Mono', Consolas, monospace; background: #f3f4f6;
        padding: 4px 10px; border-radius: 4px; color: #1f2328; }
</style>
</head>
<body>
<div class="container">
  <h1>404</h1>
  <h2>Page not found</h2>
  <p>The requested URL <span class="path">{{ path }}</span> was not found on this server.</p>
  <p><a href="/">← Go home</a></p>
</div>
</body>
</html>
